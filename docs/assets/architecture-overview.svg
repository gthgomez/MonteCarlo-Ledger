  <path d="M810 456V490" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M1055 346V490" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

  <path d="M352 214l-10 -8v16z" fill="#64748B"/>
  <path d="M352 336l-10 -8v16z" fill="#64748B"/>
