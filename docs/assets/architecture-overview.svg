<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Monte Carlo Ledger architecture overview</title>
  <desc id="desc">A diagram showing the CLI and local API feeding dashboards and workflows, which connect to timeline, forecasting, risk, and persistence layers backed by SQLite.</desc>
  <rect width="1200" height="680" rx="28" fill="#F8FAFC"/>
  <rect x="24" y="24" width="1152" height="632" rx="24" fill="white" stroke="#CBD5E1" stroke-width="2"/>

  <text x="70" y="92" fill="#0F172A" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Monte Carlo Ledger
  </text>
  <text x="70" y="126" fill="#475569" font-size="20" font-family="Segoe UI, Arial, sans-serif">
    Ledger-first finance forecasting with a deterministic timeline and Monte Carlo risk overlay
  </text>

  <rect x="70" y="170" width="230" height="88" rx="18" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="185" y="210" text-anchor="middle" fill="#0C4A6E" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">CLI</text>
  <text x="185" y="238" text-anchor="middle" fill="#075985" font-size="17" font-family="Segoe UI, Arial, sans-serif">Interactive daily workflow</text>

  <rect x="70" y="292" width="230" height="88" rx="18" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="185" y="332" text-anchor="middle" fill="#14532D" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Local API</text>
  <text x="185" y="360" text-anchor="middle" fill="#166534" font-size="17" font-family="Segoe UI, Arial, sans-serif">Safe local integration surface</text>

  <rect x="370" y="150" width="255" height="104" rx="18" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="497" y="191" text-anchor="middle" fill="#78350F" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Workflows</text>
  <text x="497" y="220" text-anchor="middle" fill="#92400E" font-size="17" font-family="Segoe UI, Arial, sans-serif">Onboarding, bills, income,</text>
  <text x="497" y="242" text-anchor="middle" fill="#92400E" font-size="17" font-family="Segoe UI, Arial, sans-serif">reconciliation, reporting</text>

  <rect x="370" y="284" width="255" height="104" rx="18" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="497" y="325" text-anchor="middle" fill="#4C1D95" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Dashboards</text>
  <text x="497" y="354" text-anchor="middle" fill="#5B21B6" font-size="17" font-family="Segoe UI, Arial, sans-serif">Balance timeline, forecast,</text>
  <text x="497" y="376" text-anchor="middle" fill="#5B21B6" font-size="17" font-family="Segoe UI, Arial, sans-serif">risk outlook</text>

  <rect x="705" y="110" width="210" height="96" rx="18" fill="#FCE7F3" stroke="#DB2777" stroke-width="2"/>
  <text x="810" y="151" text-anchor="middle" fill="#831843" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Timeline Service</text>
  <text x="810" y="178" text-anchor="middle" fill="#9D174D" font-size="16" font-family="Segoe UI, Arial, sans-serif">Builds future event streams</text>

  <rect x="705" y="235" width="210" height="96" rx="18" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="810" y="276" text-anchor="middle" fill="#5B21B6" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Forecasting</text>
  <text x="810" y="303" text-anchor="middle" fill="#6D28D9" font-size="16" font-family="Segoe UI, Arial, sans-serif">Deterministic balance path</text>

  <rect x="705" y="360" width="210" height="96" rx="18" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="810" y="401" text-anchor="middle" fill="#7F1D1D" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Risk Engine</text>
  <text x="810" y="428" text-anchor="middle" fill="#991B1B" font-size="16" font-family="Segoe UI, Arial, sans-serif">Monte Carlo scenario layer</text>

  <rect x="985" y="205" width="140" height="140" rx="24" fill="#E2E8F0" stroke="#475569" stroke-width="2"/>
  <path d="M1032 252h46M1032 276h46M1032 300h46" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="1055" cy="228" rx="30" ry="12" fill="#CBD5E1" stroke="#334155" stroke-width="4"/>
  <ellipse cx="1055" cy="322" rx="30" ry="12" fill="#CBD5E1" stroke="#334155" stroke-width="4"/>
  <text x="1055" y="375" text-anchor="middle" fill="#0F172A" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">SQLite</text>

  <rect x="705" y="500" width="420" height="96" rx="18" fill="#ECFEFF" stroke="#0891B2" stroke-width="2"/>
  <text x="915" y="541" text-anchor="middle" fill="#164E63" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Persistence + Integrity Layer</text>
  <text x="915" y="570" text-anchor="middle" fill="#155E75" font-size="17" font-family="Segoe UI, Arial, sans-serif">db_manager, migrations, foreign keys, reconciliation, occurrence linking</text>

